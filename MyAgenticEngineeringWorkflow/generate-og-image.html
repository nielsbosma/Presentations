<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1200px;
            height: 630px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
            padding: 60px;
        }
        .title {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.2;
        }
        .subtitle {
            font-size: 36px;
            font-weight: 400;
            opacity: 0.9;
            text-align: center;
            margin-bottom: 60px;
        }
        .points {
            display: flex;
            gap: 40px;
            font-size: 28px;
            font-weight: 600;
        }
        .point {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px 30px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        .author {
            position: absolute;
            bottom: 40px;
            right: 60px;
            font-size: 24px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="title">My Agentic Engineering Workflow</div>
    <div class="subtitle">Engineering @ Ivy</div>
    <div class="points">
        <div class="point">🛠️ CLIs &gt; MCPs</div>
        <div class="point">🧬 Promptware</div>
        <div class="point">🏗️ Harness</div>
    </div>
    <div class="author">by Niels Bosma</div>
</body>
</html>
